{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "adaptiveapi.fullname" . }}
  labels: {{- include "adaptiveapi.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: ["{{ .Values.ingress.host }}"]
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-api, port: { number: {{ .Values.service.apiPort }} } } }
          - path: /anthropic
            pathType: Prefix
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-api, port: { number: {{ .Values.service.apiPort }} } } }
          - path: /mcp
            pathType: Prefix
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-api, port: { number: {{ .Values.service.apiPort }} } } }
          - path: /mcp-translate
            pathType: Prefix
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-api, port: { number: {{ .Values.service.apiPort }} } } }
          - path: /generic
            pathType: Prefix
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-api, port: { number: {{ .Values.service.apiPort }} } } }
          - path: /admin
            pathType: Prefix
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-api, port: { number: {{ .Values.service.apiPort }} } } }
          - path: /saas
            pathType: Prefix
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-api, port: { number: {{ .Values.service.apiPort }} } } }
          - path: /scim
            pathType: Prefix
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-api, port: { number: {{ .Values.service.apiPort }} } } }
          - path: /healthz
            pathType: Exact
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-api, port: { number: {{ .Values.service.apiPort }} } } }
          {{- if .Values.ui.enabled }}
          - path: /
            pathType: Prefix
            backend: { service: { name: {{ include "adaptiveapi.fullname" . }}-ui, port: { number: {{ .Values.service.uiPort }} } } }
          {{- end }}
{{- end }}
