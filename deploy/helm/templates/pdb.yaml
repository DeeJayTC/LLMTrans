{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "llmtrans.fullname" . }}-api
  labels: {{- include "llmtrans.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels: {{- include "llmtrans.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
