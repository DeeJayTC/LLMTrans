{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "adaptiveapi.fullname" . }}-api
  labels: {{- include "adaptiveapi.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels: {{- include "adaptiveapi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
