apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "adaptiveapi.fullname" . }}-config
  labels: {{- include "adaptiveapi.labels" . | nindent 4 }}
data:
  ASPNETCORE_URLS: "http://+:{{ .Values.api.port }}"
  ASPNETCORE_ENVIRONMENT: "Production"
  AdaptiveApi__Edition: {{ .Values.edition | quote }}
  AdaptiveApi__Saas__MultiOrg: {{ .Values.saas.multiOrg | quote }}
  AdaptiveApi__Saas__Billing: {{ .Values.saas.billing | quote }}
  AdaptiveApi__Saas__Scim: {{ .Values.saas.scim | quote }}
  AdaptiveApi__Saas__BillingAdapter: {{ .Values.saas.billingAdapter | quote }}
  Database__Provider: {{ .Values.database.provider | quote }}
  {{- if eq .Values.database.provider "Sqlite" }}
  Database__Path: "/data/adaptiveapi.db"
  {{- end }}
  Translators__Default: {{ .Values.translators.default | quote }}
  {{- range $meter, $item := .Values.saas.stripe.subscriptionItemByMeter }}
  Stripe__SubscriptionItemByMeter__{{ $meter }}: {{ $item | quote }}
  {{- end }}
  {{- if .Values.otel.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  {{- end }}
